<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWAG // VIP 屬性建模圖鑑</title>
    <style>
        /* ==========================================
           1. 變數與基礎設定
           ========================================== */
        :root {
            --neon-pink: #FF106A;
            --neon-cyan: #00F0FF;
            --glass-base: rgba(255, 255, 255, 0.15);
            --bento-bg: rgba(255, 255, 255, 0.35);
            --text-dark: #1c1c1e;
            --text-gray: #636366;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-dark); display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden; background-color: #d1d3d8; 
        }

        /* ==========================================
           2. 背景層與光影 (內建 SVG 噪點修復 404)
           ========================================== */
        .fixed-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background-color: #d1d3d8; }
        
        /* 使用內建 SVG 噪點，保證不失效 */
        .fixed-bg::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.5'/%3E%3C/svg%3E");
            opacity: 0.25; mix-blend-mode: multiply; pointer-events: none;
        }

        .ambient-light {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vw; height: 80vw; max-width: 600px; max-height: 600px;
            background: radial-gradient(circle, rgba(255,16,106,0.3) 0%, rgba(0,240,255,0.2) 40%, transparent 70%);
            filter: blur(60px); z-index: -1; animation: pulseLight 8s infinite alternate ease-in-out;
        }
        @keyframes pulseLight { 0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); } 100% { transform: translate(-50%, -50%) scale(1.2) rotate(15deg); } }

        /* ==========================================
           3. 核心玻璃材質 (Premium Glassmorphism)
           ========================================== */
        .glass-panel {
            background: var(--glass-base); backdrop-filter: blur(35px) saturate(180%); -webkit-backdrop-filter: blur(35px) saturate(180%);
            border-radius: 40px; border-top: 1.5px solid rgba(255, 255, 255, 0.95); border-left: 1.5px solid rgba(255, 255, 255, 0.7);
            border-right: 1px solid rgba(255, 255, 255, 0.3); border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 24px; max-width: 440px; width: 92%; position: relative; z-index: 10;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.15), inset 0 4px 6px rgba(255, 255, 255, 0.8), inset 0 -10px 30px rgba(255, 255, 255, 0.1);
            text-align: center; margin: 30px auto; overflow: hidden;
        }

        .glass-panel::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 180deg at 50% 50%, rgba(255,16,106,0.05) 0deg, rgba(0,240,255,0.08) 120deg, rgba(255,235,160,0.05) 240deg, rgba(255,16,106,0.05) 360deg);
            z-index: -1; animation: spinIridescent 15s linear infinite; pointer-events: none;
        }
        @keyframes spinIridescent { 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        /* ==========================================
           4. 裝飾與 UI 元件 (Buttons & Text)
           ========================================== */
        h1 { font-size: clamp(26px, 8vw, 32px); font-weight: 900; letter-spacing: -0.5px; margin-bottom: 12px; color: var(--text-dark); text-shadow: 0 4px 15px rgba(255,255,255,0.8); }

        .btn-glass {
            background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.6) 100%); border: 1px solid #fff;
            color: var(--neon-pink); padding: 18px 24px; font-size: 16px; font-weight: 900; border-radius: 24px;
            cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 20px rgba(0,0,0,0.08), inset 0 2px 2px rgba(255,255,255,1), 0 0 15px rgba(255, 16, 106, 0.2);
            backdrop-filter: blur(10px);
        }
        .btn-glass:hover { box-shadow: 0 15px 25px rgba(0,0,0,0.1), inset 0 2px 2px rgba(255,255,255,1), 0 0 25px rgba(255, 16, 106, 0.5); transform: translateY(-2px); }
        .btn-glass:active { transform: scale(0.96); }

        .option-btn {
            display: block; background: var(--bento-bg); border: 1px solid rgba(255, 255, 255, 0.6); border-top: 1px solid rgba(255, 255, 255, 0.9);
            color: var(--text-dark); padding: 18px 20px; margin: 14px 0; border-radius: 20px; font-size: 15px; font-weight: 700;
            cursor: pointer; text-align: left; transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.03); line-height: 1.5;
        }
        .option-btn:active { background: rgba(255, 255, 255, 0.9); border-color: var(--neon-pink); transform: scale(0.98); }

        /* ==========================================
           5. 盲盒圖鑑排版 (Tech-spec layout)
           ========================================== */
        .poster-card {
            background-color: rgba(255, 255, 255, 0.2); background-image: linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 20px 20px; border: 1px solid rgba(255, 255, 255, 0.5); padding: 24px 18px; border-radius: 28px;
            text-align: left; position: relative; box-shadow: inset 0 0 20px rgba(255,255,255,0.5);
        }

        .cross { position: absolute; width: 10px; height: 10px; opacity: 0.4; }
        .cross::before, .cross::after { content: ''; position: absolute; background: #000; }
        .cross::before { top: 4px; left: 0; width: 100%; height: 1.5px; } .cross::after { top: 0; left: 4px; width: 1.5px; height: 100%; }
        .c-tl { top: 12px; left: 12px; } .c-tr { top: 12px; right: 12px; } .c-bl { bottom: 12px; left: 12px; } .c-br { bottom: 12px; right: 12px; }

        .poster-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid rgba(0,0,0,0.1); padding-bottom: 12px; margin-bottom: 20px; }
        .poster-header h2 { margin: 0; font-size: 36px; font-weight: 900; color: var(--text-dark); line-height: 1; text-transform: uppercase; }
        .barcode-area { text-align: right; font-family: 'Courier New', monospace; font-size: 10px; color: var(--text-gray); line-height: 1.3; }

        .avatar-section { display: flex; justify-content: center; align-items: center; margin: 35px 0; position: relative; }
        .avatar-emoji { font-size: 90px; filter: drop-shadow(0 25px 25px rgba(0,0,0,0.2)) drop-shadow(0 0 20px rgba(255, 255, 255, 0.9)) contrast(1.1) saturate(1.2); animation: floatToy 4s ease-in-out infinite; }
        @keyframes floatToy { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-12px) scale(1.02); } }

        .bento-grid { display: grid; gap: 12px; }
        .bento-box {
            background: var(--bento-bg); border: 1px solid rgba(255, 255, 255, 0.6); border-top: 1px solid rgba(255,255,255,0.9);
            padding: 16px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .bento-box strong { display: flex; justify-content: space-between; align-items: baseline; font-size: 10px; text-transform: uppercase; color: var(--neon-pink); letter-spacing: 1.5px; margin-bottom: 8px; font-family: monospace; }
        .bento-box span { font-size: 14px; line-height: 1.6; color: var(--text-gray); font-weight: 600; }
        .bento-box .title-text { font-size: 16px; font-weight: 900; color: var(--text-dark); display: block; margin-bottom: 4px; }

        /* EQ Charts */
        .eq-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 12px; font-family: monospace; font-weight: bold; color: var(--text-dark); }
        .eq-label { display: flex; flex-direction: column; width: 45px; line-height: 1.2; }
        .eq-label span { font-size: 12px; font-weight: 900; color: var(--text-dark); }
        .eq-label small { font-size: 9px; font-family: sans-serif; color: var(--text-gray); font-weight: normal; }
        .eq-bar-bg { flex-grow: 1; height: 6px; background: rgba(0,0,0,0.1); border-radius: 10px; margin: 0 10px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1); }
        .eq-bar-fill { height: 100%; background: var(--neon-cyan); border-radius: 10px; box-shadow: 0 0 8px var(--neon-cyan); transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .eq-val { width: 22px; text-align: right; font-size: 12px; }

        .tag-container { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
        .tag { background: #fff; color: var(--text-dark); border: 1px solid #eee; padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 800; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    </style>
</head>
<body>

    <div class="fixed-bg"></div>
    <div class="ambient-light"></div>

    <!-- 首頁 -->
    <div class="glass-panel" id="home-screen">
        <h1>你是什麼 VIP 人格？</h1>
        <p style="color: var(--text-gray); font-size: 15px; font-weight: 600; line-height: 1.7; margin-bottom: 30px;">
            透過 3D 數據建模<br>8 題拆解你是什麼人格
        </p>
        <button class="btn-glass" onclick="startQuiz()">看看你是什麼人格</button>
    </div>

    <!-- 測驗頁面 -->
    <div class="glass-panel hidden" id="quiz-screen">
        <!-- 修復點：確保這裡有 progress-text 可以被 JS 抓到 -->
        <div style="font-family: monospace; font-size: 11px; color: var(--neon-pink); font-weight: bold; margin-bottom: 15px; letter-spacing: 2px;">
            SYS.SCANNING [<span id="progress-text">1/8</span>]
        </div>
        <div id="question-text" style="font-size: 20px; font-weight: 900; margin-bottom: 25px; line-height: 1.4;"></div>
        <div id="options-container"></div>
    </div>

    <!-- 結果頁面 -->
    <div class="glass-panel hidden" id="result-screen">
        <div class="poster-card">
            <!-- 裝飾定位點 -->
            <div class="cross c-tl"></div><div class="cross c-tr"></div>
            <div class="cross c-bl"></div><div class="cross c-br"></div>

            <div class="poster-header">
                <div>
                    <span style="font-size: 10px; color: var(--neon-pink); font-family: monospace; font-weight: bold;">CLASS.MODEL</span>
                    <h2 id="r-title"></h2>
                </div>
                <div class="barcode-area">
                    <span style="font-size: 14px;">||| | || ||||</span><br>
                    UID: <span id="random-id"></span>
                </div>
            </div>

            <div class="avatar-section"><div class="avatar-emoji" id="r-avatar"></div></div>

            <div class="bento-grid">
                <!-- 身份畫像 -->
                <div class="bento-box">
                    <strong><span>Identity <span style="font-size: 9px; color: var(--text-gray); font-family: sans-serif;">/ 身份畫像</span></span> <span>LV.MAX</span></strong>
                    <span class="title-text" id="r-mbti"></span>
                    <span id="r-profile"></span>
                </div>

                <!-- 屬性數值 -->
                <div class="bento-box">
                    <strong><span>Attributes <span style="font-size: 9px; color: var(--text-gray); font-family: sans-serif;">/ 核心數值</span></span></strong>
                    <div class="eq-row">
                        <div class="eq-label"><span>ATK</span><small>戰鬥力</small></div>
                        <div class="eq-bar-bg"><div class="eq-bar-fill" id="eq-atk" style="width: 0%; background: var(--neon-pink);"></div></div>
                        <span class="eq-val" id="val-atk">0</span>
                    </div>
                    <div class="eq-row">
                        <div class="eq-label"><span>DEP</span><small>依賴度</small></div>
                        <div class="eq-bar-bg"><div class="eq-bar-fill" id="eq-dep" style="width: 0%;"></div></div>
                        <span class="eq-val" id="val-dep">0</span>
                    </div>
                </div>

                <!-- 觀測八卦 -->
                <div class="bento-box">
                    <strong><span>Observation <span style="font-size: 9px; color: var(--text-gray); font-family: sans-serif;">/ 觀測八卦</span></span></strong>
                    <span id="r-gossip" style="font-style: italic;"></span>
                    <div class="tag-container" id="r-tags"></div>
                </div>
            </div>
        </div>
        <button class="btn-glass" onclick="location.reload()">REBOOT // 重新初始化</button>
    </div>

    <script>
        // 綁定你的 GAS 網址
        const gasUrl = 'https://script.google.com/macros/s/AKfycbwQKgy5XJ0xWHX37T6Z_dxLMpJoYcnkKmSxskSTVLFHDDor6UPF1z8WkVhVRbgeaz1P/exec';

        const questions = [
            { q: "Q1：領地意識\n當你發現女神直播間有另一個大戶跟她聊得很熱絡時？", options: [ { text: "瘋狂刷禮彈幕刷屏，要把風頭搶回來。", scores: { s: 1, a: 1, dep: 1 } }, { text: "靜靜看著，或是去別的直播間逛逛。", scores: { s: -1, a: -1, dep: -1 } } ] },
            { q: "Q2：活動誘因\n收到「女神聚會」活動邀請，你第一時間會看？", options: [ { text: "這場聚會能有多少「排場」與「專屬頭銜」。", scores: { s: 1, l: 1 } }, { text: "是否能跟女神有面對面「靈魂交流」的機會。", scores: { s: -1, l: -1 } } ] },
            { q: "Q3：身份驗證觀點\n你如何看待平台的身份驗證機制？", options: [ { text: "這是我進入「高級圈子」的入場券。", scores: { l: 1, a: 1 } }, { text: "這是保護我跟女神互動隱私的最後防線。", scores: { s: -1, l: -1 } } ] },
            { q: "Q4：深夜心理\n當女神下播後，你的心情通常是？", options: [ { text: "感到一陣空虛，會反覆刷她的動態或舊片。", scores: { l: -1, dep: 1 } }, { text: "回歸現實生活，等下次有空再上線。", scores: { l: 1, dep: -1 } } ] },
            { q: "Q5：戰鬥本能\n活動倒數 10 秒，你與對手積分極度接近，你會？", options: [ { text: "不計預算反超，就是要贏過對方。", scores: { a: 1, l: -1 } }, { text: "盡力而為，如果太貴就下次再說。", scores: { a: -1, l: 1 } } ] },
            { q: "Q6：關係定位\n你希望在女神心中是一個什麼樣的存在？", options: [ { text: "帶領大家支持她的「精神領袖」。", scores: { s: 1, a: 1 } }, { text: "唯一懂她、能讓她卸下武裝的「心靈支柱」。", scores: { s: -1, l: -1, dep: 1 } } ] },
            { q: "Q7：忠誠習慣\n你的消費習慣更像以下哪一種？", options: [ { text: "每天固定刷「早安禮」，像打卡一樣穩定。", scores: { a: -1, l: -1 } }, { text: "平時不一定出現，但重大活動一定豪擲千金。", scores: { a: 1, l: 1 } } ] },
            { q: "Q8：社群互動\n如果女神在聚會中帶了其他主播一起出席？", options: [ { text: "覺得熱鬧，認識新朋友也不錯。", scores: { s: 1, dep: -1 } }, { text: "感到不自在，只想跟原本支持的人說話。", scores: { s: -1, dep: 1 } } ] }
        ];

        const resultsData = {
            "ceo": { case_id: "jmarx5168 型", mbti: "S-A-DEP", title: "霸道總裁", avatar: "🦁", profile: "極度重視尊嚴、契約與排名。你不是在玩遊戲，是在「統治」榜單。", gossip: "對誠信要求極高，觸碰紅線必翻臉。", tags: ["#權力至上", "#屠榜狂魔"], atk: 98, dep: 85 },
            "saint": { case_id: "hpwwph21 型", mbti: "P-E-DEP", title: "純情聖徒", avatar: "🦄", profile: "情感極度脆弱且深情。即便家境變故也無法停止支持。", gossip: "追求靈魂連結到近乎偏執。", tags: ["#專屬陪伴", "#情感寄託"], atk: 35, dep: 99 },
            "warlord": { case_id: "aa6655891 型", mbti: "S-A-L", title: "戰鬥領主", avatar: "🐉", profile: "理性導師。喜歡教導主播業績規劃，消費廣泛但有邏輯。", gossip: "享受成為平台意見領袖的成就感。", tags: ["#競技玩家", "#無情刷客"], atk: 95, dep: 20 },
            "knight": { case_id: "sky537 型", mbti: "P-E-D", title: "守護騎士", avatar: "🐶", profile: "暖男型 VIP。在乎和氣，喜歡送禮給工作人員與主播。", gossip: "追求線下活動的群聚和諧感。", tags: ["#地下村長", "#情緒安定"], atk: 45, dep: 90 },
            "nomad": { case_id: "q888888qq 型", mbti: "L-LOWDEP", title: "遊蕩散戶", avatar: "🦊", profile: "隨性但挑剔。一旦出現就直衝特定的「美食」或一對一。", gossip: "對數據敏銳，只支持真正值得的對象。", tags: ["#精算大師", "#流連百花"], atk: 70, dep: 10 },
            "ghost": { case_id: "觀測者", mbti: "P-L-LOWDEP", title: "幽靈觀察家", avatar: "👁️", profile: "極低依賴度。只在暗處看戲與精算。", gossip: "隱私是你的最高準則，極少暴露真實情緒。", tags: ["#隱私至上", "#吃瓜群眾"], atk: 20, dep: 5 }
        };

        let currentQ = 0;
        let dim = { s: 0, l: 0, a: 0, dep: 0 };

        function startQuiz() { 
            document.getElementById('home-screen').classList.add('hidden'); 
            document.getElementById('quiz-screen').classList.remove('hidden'); 
            renderQ(); 
            window.scrollTo(0, 0); 
        }

        function renderQ() {
            const q = questions[currentQ]; 
            // 更新進度與題目
            document.getElementById('progress-text').innerText = `${currentQ + 1}/8`; 
            document.getElementById('question-text').innerText = q.q;
            
            const box = document.getElementById('options-container'); 
            box.innerHTML = "";
            q.options.forEach(opt => { 
                const btn = document.createElement('button'); 
                btn.className = "option-btn"; 
                btn.innerText = opt.text; 
                btn.onclick = () => selectOpt(opt.scores); 
                box.appendChild(btn); 
            });
        }

        function selectOpt(scores) {
            dim.s += scores.s || 0; 
            dim.l += scores.l || 0; 
            dim.a += scores.a || 0; 
            dim.dep += scores.dep || 0;
            currentQ++; 
            if(currentQ < 8) { 
                renderQ(); 
                window.scrollTo(0, 0); 
            } else { 
                showRes(); 
                window.scrollTo(0, 0); 
            }
        }

        function showRes() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            let match = {
                "ceo": dim.s + dim.a + dim.dep, 
                "saint": -dim.s - dim.l + dim.dep,
                "warlord": dim.s + dim.a + dim.l, 
                "knight": -dim.s - dim.l - dim.a,
                "nomad": dim.l - dim.dep, 
                "ghost": -dim.s + dim.l - dim.dep
            };
            
            let topProfile = Object.keys(match).reduce((a, b) => match[a] > match[b] ? a : b);
            const data = resultsData[topProfile];
            
            // 寫入 UI 介面
            document.getElementById('r-mbti').innerText = data.mbti;
            document.getElementById('r-title').innerText = data.title;
            document.getElementById('r-avatar').innerText = data.avatar;
            document.getElementById('r-profile').innerText = data.profile;
            document.getElementById('r-gossip').innerText = data.gossip;
            document.getElementById('random-id').innerText = Math.floor(100000 + Math.random() * 900000);
            
            const tagsBox = document.getElementById('r-tags'); 
            tagsBox.innerHTML = "";
            data.tags.forEach(t => { 
                const tagEl = document.createElement('div'); 
                tagEl.className = 'tag'; 
                tagEl.innerText = t; 
                tagsBox.appendChild(tagEl); 
            });

            // 背景傳送至 Google Sheet (就算被擋下也不影響使用者畫面)
            fetch(gasUrl, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ title: data.title, case_id: data.case_id, mbti_tag: data.mbti }) 
            }).catch(err => console.log('Data sync ignored.'));

            // 動態跑數據條動畫
            setTimeout(() => {
                document.getElementById('eq-atk').style.width = data.atk + '%';
                document.getElementById('val-atk').innerText = data.atk;
                document.getElementById('eq-dep').style.width = data.dep + '%';
                document.getElementById('val-dep').innerText = data.dep;
            }, 100);
        }
    </script>
</body>
</html>
